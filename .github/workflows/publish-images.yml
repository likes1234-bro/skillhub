name: Publish Images

on:
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: publish-images-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  DOCKER_PLATFORMS: linux/amd64,linux/arm64

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: server
            context: ./server
            dockerfile: ./server/Dockerfile
            image: ghcr.io/${{ github.repository_owner }}/skillhub-server
            mirror_image: skillhub-server
          - name: web
            context: ./web
            dockerfile: ./web/Dockerfile
            image: ghcr.io/${{ github.repository_owner }}/skillhub-web
            mirror_image: skillhub-web

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to mirror registry
        if: ${{ secrets.MIRROR_REGISTRY != '' && secrets.MIRROR_NAMESPACE != '' && secrets.MIRROR_REGISTRY_USERNAME != '' && secrets.MIRROR_REGISTRY_PASSWORD != '' }}
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.MIRROR_REGISTRY }}
          username: ${{ secrets.MIRROR_REGISTRY_USERNAME }}
          password: ${{ secrets.MIRROR_REGISTRY_PASSWORD }}

      - name: Prepare image targets
        id: targets
        env:
          MIRROR_ENABLED: ${{ secrets.MIRROR_REGISTRY != '' && secrets.MIRROR_NAMESPACE != '' && secrets.MIRROR_REGISTRY_USERNAME != '' && secrets.MIRROR_REGISTRY_PASSWORD != '' }}
          MIRROR_REGISTRY: ${{ secrets.MIRROR_REGISTRY }}
          MIRROR_NAMESPACE: ${{ secrets.MIRROR_NAMESPACE }}
        run: |
          {
            echo "images<<EOF"
            echo "${{ matrix.image }}"
            if [ "${MIRROR_ENABLED}" = "true" ]; then
              echo "${MIRROR_REGISTRY%/}/${MIRROR_NAMESPACE}/${{ matrix.mirror_image }}"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.targets.outputs.images }}
          tags: |
            type=raw,value=edge,enable={{is_default_branch}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=ref,event=tag
            type=sha,format=short,prefix=sha-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: ${{ env.DOCKER_PLATFORMS }}
          push: true
          provenance: false
          sbom: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

  mirror-runtime-images:
    name: Mirror Runtime Images
    runs-on: ubuntu-latest
    needs: publish
    if: ${{ secrets.MIRROR_REGISTRY != '' && secrets.MIRROR_NAMESPACE != '' && secrets.MIRROR_REGISTRY_USERNAME != '' && secrets.MIRROR_REGISTRY_PASSWORD != '' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to mirror registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.MIRROR_REGISTRY }}
          username: ${{ secrets.MIRROR_REGISTRY_USERNAME }}
          password: ${{ secrets.MIRROR_REGISTRY_PASSWORD }}

      - name: Mirror runtime dependency images
        env:
          MIRROR_REGISTRY: ${{ secrets.MIRROR_REGISTRY }}
          MIRROR_NAMESPACE: ${{ secrets.MIRROR_NAMESPACE }}
        run: bash scripts/mirror-runtime-images.sh
