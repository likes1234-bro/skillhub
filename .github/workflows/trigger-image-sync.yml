name: Trigger Image Sync

on:
  workflow_run:
    workflows: ["Publish Images"]
    types:
      - completed
  workflow_dispatch:

jobs:
  trigger-sync:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Trigger docker_image_pusher workflow
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: token ${{ secrets.TRIGGER_TOKEN }}" \
            https://api.github.com/repos/${{ github.repository_owner }}/docker_image_pusher/dispatches \
            -d '{"event_type":"sync-images","client_payload":{"triggered_by":"skillhub","ref":"${{ github.ref }}"}}'

      - name: Wait for sync to start
        run: sleep 5

      - name: Notify
        run: |
          echo "✅ 已触发阿里云镜像同步"
          echo "📦 仓库: docker_image_pusher"
          echo "🔗 查看进度: https://github.com/${{ github.repository_owner }}/docker_image_pusher/actions"
